<style>
body {
    margin: 0;

}

/* Gallery Layout */
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows:repeat(2,1fr);
    gap: 10px;
   /* flex:1;*/
    width:95%;
    margin: 10px auto;
}

.gallery img {
    width: 50%;
    height:60%;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}

/* Hover effect */
.gallery img:hover {
    transform: scale(1.1);
}

/* Slight tilt effect */
.gallery img:nth-child(odd) {
    transform: rotate(-2deg);
}

.gallery img:nth-child(even) {
    transform: rotate(2deg);
}
</style>

</head>
